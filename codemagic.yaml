# Codemagic CI/CD — Caminare (Fase 3)
# Dois workflows: Android (compila aqui mesmo) e iOS (scaffold + build no Mac da CI,
# já que a pasta ios/ não é versionada — foi gerada só no Codemagic).
#
# Antes do primeiro build, configure no Codemagic:
#  - Android: grupo de variáveis "android_signing" com o keystore (CM_KEYSTORE,
#    CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD) e a conta de serviço do
#    Google Play (GCLOUD_SERVICE_ACCOUNT_CREDENTIALS) p/ publicação.
#  - iOS: integração "App Store Connect API key" + certificado de distribuição.
#    Ajuste o bundle id com.caminare.app e o team id.
#  - Variáveis do app (build web): VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY.
#    NÃO defina VITE_SHOW_DEV_TOOLS (painel de teste fica escondido em produção).

workflows:
  android:
    name: Android (Play Store)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - android_signing
        - app_env
      node: 20
      java: 17
    scripts:
      - name: Instalar dependências
        script: npm ci
      - name: Gerar .env de produção
        script: |
          printf "VITE_SUPABASE_URL=%s\n" "$VITE_SUPABASE_URL" > .env.production
          printf "VITE_SUPABASE_ANON_KEY=%s\n" "$VITE_SUPABASE_ANON_KEY" >> .env.production
          printf "VITE_API_BASE_URL=%s\n" "$VITE_API_BASE_URL" >> .env.production
          echo "URL len: ${#VITE_SUPABASE_URL} | ANON len: ${#VITE_SUPABASE_ANON_KEY} | API_BASE: ${VITE_API_BASE_URL:-(vazio/relativo)}"
      - name: Build web + sync Capacitor
        script: npm run native:build
      - name: Configurar keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > "$CM_BUILD_DIR/release.keystore"
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storeFile=$CM_BUILD_DIR/release.keystore
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      - name: Build AAB (release)
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    # 1º build: ainda NÃO temos a conta de serviço do Google Play. Vamos baixar o
    # .aab dos artifacts e subir manualmente na Play Console. Quando a conta de
    # serviço (GCLOUD_SERVICE_ACCOUNT_CREDENTIALS) estiver configurada, descomente.
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true

  ios:
    name: iOS (App Store)
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: codemagic_asc_api_key
    environment:
      groups:
        - app_env
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.caminare.app
    scripts:
      - name: Instalar dependências
        script: npm ci
      - name: Gerar .env de produção
        script: |
          printf "VITE_SUPABASE_URL=%s\n" "$VITE_SUPABASE_URL" > .env.production
          printf "VITE_SUPABASE_ANON_KEY=%s\n" "$VITE_SUPABASE_ANON_KEY" >> .env.production
          printf "VITE_API_BASE_URL=%s\n" "$VITE_API_BASE_URL" >> .env.production
          echo "URL len: ${#VITE_SUPABASE_URL} | ANON len: ${#VITE_SUPABASE_ANON_KEY} | API_BASE: ${VITE_API_BASE_URL:-(vazio/relativo)}"
      - name: Build web
        script: npm run build
      - name: Adicionar plataforma iOS (não versionada)
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Configurar iOS (deep links + entitlements)
        script: |
          set -e
          PLIST="ios/App/App/Info.plist"
          # Esquema custom de deep link (com.caminare.app://) — o Info.plist gerado
          # pelo Capacitor não traz; adiciona via PlistBuddy (idempotente).
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.caminare.app" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string com.caminare.app" "$PLIST"
          # Permissões de voz (gravação por voz com transcrição nativa). O Info.plist
          # gerado pelo Capacitor não traz; sem estas strings o iOS rejeita o uso de
          # microfone/SFSpeechRecognizer (crash) e a App Store reprova. Idempotente.
          MIC_MSG="O Caminare usa o microfone para transcrever sua fala em texto no seu registro."
          /usr/libexec/PlistBuddy -c "Delete :NSMicrophoneUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string $MIC_MSG" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :NSSpeechRecognitionUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string $MIC_MSG" "$PLIST"
          # Entitlements: Sign in with Apple + Associated Domains (Universal Links).
          # ⚠️ Trocar __DOMINIO_PROD__ no arquivo native/ios/App.entitlements antes do release.
          cp native/ios/App.entitlements ios/App/App/App.entitlements
      - name: Instalar pods
        script: |
          cd ios/App && pod install
      - name: Configurar code signing
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
